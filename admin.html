<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ — Хурлын тэмдэглэл</title>
<style>
  :root {
    --bg: #f7f7f8;
    --card: #ffffff;
    --border: #e2e2e6;
    --primary: #5b48ee;
    --primary-dark: #4636c4;
    --text: #1f1f24;
    --muted: #6b6b76;
    --ok: #1a8a4a;
    --warn: #b8590c;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 32px 16px;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  p.subtitle { color: var(--muted); margin-top: 0; margin-bottom: 24px; font-size: 14px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
  input[type="password"], input[type="text"] {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 14px;
    background: #fff;
  }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .row > div { flex: 1; min-width: 200px; }
  button {
    background: var(--primary);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
    margin-right: 8px;
  }
  button:hover { background: var(--primary-dark); }
  button:disabled { background: #b7b3e8; cursor: not-allowed; }
  button.secondary { background: #eee; color: var(--text); }
  button.secondary:hover { background: #e0e0e0; }
  button.danger { background: #c0392b; }
  button.danger:hover { background: #a83224; }
  #status {
    margin-top: 14px;
    font-size: 14px;
    color: var(--muted);
    white-space: pre-line;
  }
  #status.ok { color: var(--ok); }
  #status.warn { color: var(--warn); }
  .hint { font-size: 13px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🔑 Админ панель</h1>
  <p class="subtitle">Ажилтны нэвтрэх эрх удирдах — энэ хуудасны холбоосыг зөвхөн та л мэдэж байгаарай.</p>

  <div class="card">
    <label for="adminKeyInput">Admin key</label>
    <input type="password" id="adminKeyInput" placeholder="admin key" autocomplete="off">
  </div>

  <div class="card">
    <label>Шинэ ажилтан нэмэх / нууц үг солих</label>
    <div class="hint" style="margin-top:0; margin-bottom:10px;">Одоо байгаа нэвтрэх нэрээр дахин ажиллуулбал тухайн хүний нууц үг шинэчлэгдэнэ.</div>
    <div class="row">
      <div>
        <label for="newUsername">Нэвтрэх нэр</label>
        <input type="text" id="newUsername" placeholder="нэвтрэх нэр">
      </div>
      <div>
        <label for="newPassword">Нууц үг</label>
        <input type="password" id="newPassword" placeholder="нууц үг (6+ тэмдэгт)">
      </div>
    </div>
    <button id="createUserBtn">Хадгалах</button>
  </div>

  <div class="card">
    <label>Ажилтнуудын жагсаалт</label>
    <button class="secondary" id="listUsersBtn">Жагсаах</button>
    <div class="row" style="margin-top:14px;">
      <div>
        <label for="deleteUsername">Хасах нэвтрэх нэр</label>
        <input type="text" id="deleteUsername" placeholder="нэвтрэх нэр">
      </div>
    </div>
    <button class="danger" id="deleteUserBtn">Хасах</button>
    <div id="status"></div>
  </div>
</div>

<script>
  const WORKER_URL = 'https://khural-backend.basjargalzoljargal.workers.dev';

  const adminKeyInput = document.getElementById('adminKeyInput');
  const newUsername = document.getElementById('newUsername');
  const newPassword = document.getElementById('newPassword');
  const createUserBtn = document.getElementById('createUserBtn');
  const listUsersBtn = document.getElementById('listUsersBtn');
  const deleteUsername = document.getElementById('deleteUsername');
  const deleteUserBtn = document.getElementById('deleteUserBtn');
  const statusEl = document.getElementById('status');

  function setStatus(text, kind) {
    statusEl.textContent = text;
    statusEl.className = kind || '';
  }

  createUserBtn.addEventListener('click', async () => {
    const adminKey = adminKeyInput.value.trim();
    const username = newUsername.value.trim();
    const password = newPassword.value;
    if (!adminKey || !username || !password) {
      setStatus('Admin key, нэвтрэх нэр, нууц үг бүгдийг оруулна уу.', 'warn');
      return;
    }
    createUserBtn.disabled = true;
    setStatus('Хадгалж байна...', '');
    try {
      const resp = await fetch(`${WORKER_URL}/api/admin/create-user`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body: JSON.stringify({ username, password }),
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || 'Алдаа гарлаа');
      setStatus(`"${data.username}" амжилттай хадгалагдлаа.`, 'ok');
      newUsername.value = '';
      newPassword.value = '';
    } catch (err) {
      setStatus('Алдаа: ' + (err.message || err), 'warn');
    } finally {
      createUserBtn.disabled = false;
    }
  });

  listUsersBtn.addEventListener('click', async () => {
    const adminKey = adminKeyInput.value.trim();
    if (!adminKey) {
      setStatus('Admin key оруулна уу.', 'warn');
      return;
    }
    listUsersBtn.disabled = true;
    setStatus('Уншиж байна...', '');
    try {
      const resp = await fetch(`${WORKER_URL}/api/admin/list-users`, {
        headers: { 'x-admin-key': adminKey },
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || 'Алдаа гарлаа');
      setStatus(data.users.length ? 'Ажилтнууд: ' + data.users.join(', ') : 'Одоогоор ажилтан бүртгэгдээгүй байна.', 'ok');
    } catch (err) {
      setStatus('Алдаа: ' + (err.message || err), 'warn');
    } finally {
      listUsersBtn.disabled = false;
    }
  });

  deleteUserBtn.addEventListener('click', async () => {
    const adminKey = adminKeyInput.value.trim();
    const username = deleteUsername.value.trim();
    if (!adminKey || !username) {
      setStatus('Admin key болон хасах нэрийг оруулна уу.', 'warn');
      return;
    }
    if (!confirm(`"${username}" хэрэглэгчийг устгах уу?`)) return;
    deleteUserBtn.disabled = true;
    setStatus('Устгаж байна...', '');
    try {
      const resp = await fetch(`${WORKER_URL}/api/admin/delete-user`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body: JSON.stringify({ username }),
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || 'Алдаа гарлаа');
      setStatus(`"${username}" устгагдлаа.`, 'ok');
      deleteUsername.value = '';
    } catch (err) {
      setStatus('Алдаа: ' + (err.message || err), 'warn');
    } finally {
      deleteUserBtn.disabled = false;
    }
  });
</script>
</body>
</html>
